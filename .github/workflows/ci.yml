# ci.yml — MoonSwift
#
# Location: .github/workflows/ci.yml
# Role: Continuous integration gate for every push and pull request on main.
#       Two sequential jobs mirror the two-phase build in the Makefile:
#       (1) shim — formats, lints, and tests the Rust shim; (2) swift —
#       builds and tests the Swift package in source mode with the freshly
#       built shim artifact from job (1).
#
# Runners: the swift job runs a two-arch matrix.
#   • macos-15-intel (x86_64) — PRIMARY, blocking. MoonSwift's first target
#     machine is Intel (development happens on x86_64); this gate must be green.
#   • macos-15 (arm64) — secondary, non-blocking (continue-on-error). Keeps
#     Apple Silicon signal flowing while arm64-specific issues (small
#     swift-testing stacks, arm64e PAC interactions with the Rust dylib) are
#     worked through without blocking x86 development.
#   Both ship Xcode 16 (Swift 6 toolchain per swift-tools-version 6.0).
#   Note: macos-15-intel is the last x86_64 image GitHub provides (retires
#   August 2027) — revisit the matrix before then.
#
# Environment variables propagated to every Swift step (mirrors the Makefile):
#   MOONSWIFT_SHIM_SOURCE=1    — source-build mode: CRatatuiFFI is the stub
#                                C target linked against the Rust static lib
#   LUASWIFT_INCLUDE_TOMLKIT=1 — include the luaswift.toml module (LuaSwift
#                                reads this at manifest-evaluation time)
#
# Caches:
#   • Cargo registry + build artefacts — keyed on rust/ratatui-ffi/Cargo.lock
#   • SPM build artefacts            — keyed on Package.resolved
#     (Note: the swift job always runs `swift package reset` before building,
#      which clears the manifest-evaluation cache but leaves the package download
#      cache intact.  The SPM cache key therefore still speeds up dependency
#      fetches between runs.)
#
# Concurrency: one run per ref at a time; in-progress runs are cancelled when
#              a newer push arrives on the same branch or PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same ref so pushes during a long
# build do not queue up and waste runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── job 1: shim ─────────────────────────────────────────────────────────────
  # Validate and test the Rust shim (rust/ratatui-ffi/).
  # Steps mirror `cargo fmt --check`, `cargo clippy -D warnings`, `cargo test`
  # run manually in that directory (Makefile `test` target: cargo test).
  shim:
    name: Shim (Rust)
    runs-on: macos-15

    defaults:
      run:
        # All cargo commands run from the shim directory.
        working-directory: rust/ratatui-ffi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the stable Rust toolchain (includes cargo fmt + clippy).
      # dtolnay/rust-toolchain is the canonical action for this — it reads the
      # channel from the `toolchain` input and sets up rustup without requiring
      # a rust-toolchain.toml file.
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache Cargo registry downloads and compiled dependencies.
      # Keyed on Cargo.lock so a lockfile change invalidates the cache.
      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/ratatui-ffi/target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/ratatui-ffi/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Formatting check — equivalent to `cargo fmt --check`.
      # A diff fails the job; contributors run `cargo fmt` locally to fix.
      - name: Check Rust formatting (cargo fmt)
        run: cargo fmt --check

      # Lint check — clippy in deny-warnings mode on the library target only.
      # The tool binaries (ffi_introspect, gen_header) are internal utilities
      # vendored from upstream; --lib scopes the gate to the FFI library itself.
      # Mirrors the CONTRIBUTING gate: all clippy warnings are errors in CI.
      - name: Lint Rust sources (cargo clippy --lib -D warnings)
        run: cargo clippy --lib -- -D warnings

      # Rust unit tests.
      # The shim has no Swift dependency, so this step needs no shim build
      # artefact — cargo test compiles and links the test harness itself.
      # Single-threaded: the last-error slot is process-global by design
      # (single-UI-thread library; avoids TLS for arm64e — guard.rs §note),
      # so concurrent test threads race on set/clear of the shared slot.
      - name: Run Rust tests (cargo test)
        run: cargo test -- --test-threads=1

  # ── job 2: swift ────────────────────────────────────────────────────────────
  # Build and test the Swift package in source mode.
  # Depends on `shim` so the static lib (target/release/libratatui_ffi.a) and
  # the cbindgen header are available before SPM resolves linker settings.
  swift:
    name: Swift package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: shim
    # The arm64 leg is advisory: its failure does not fail the workflow.
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      # Let the x86_64 leg finish even if the arm64 leg fails early.
      fail-fast: false
      matrix:
        include:
          # PRIMARY — the project's first target machine is Intel.
          - runner: macos-15-intel
            arch: x86_64
            experimental: false
          # SECONDARY — Apple Silicon signal, non-blocking while arm64
          # runner-specific issues are worked through.
          - runner: macos-15
            arch: arm64
            experimental: true

    env:
      # Source mode: CRatatuiFFI is declared as a stub C target linked against
      # the Rust static lib (ARCHITECTURE.md §5.4 bootstrap rule).
      MOONSWIFT_SHIM_SOURCE: "1"
      # Include the luaswift.toml module — LuaSwift reads this env var at
      # manifest-evaluation time (ARCHITECTURE.md §5.4 toml propagation).
      LUASWIFT_INCLUDE_TOMLKIT: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the same stable Rust toolchain so we can build the shim.
      # The shim job already ran, but this job needs cargo to produce the
      # static lib that the Swift linker flags point at.
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      # Restore the Cargo cache — the shim job already populated it.
      # The same key means this restore will typically hit without re-downloading.
      # Keyed per-arch: the x86_64 and arm64 legs produce incompatible
      # target/ artefacts and must not share a cache entry.
      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/ratatui-ffi/target
          key: cargo-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('rust/ratatui-ffi/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.arch }}-

      # Build the Rust shim (cdylib + staticlib).  cargo produces both
      # libratatui_ffi.dylib and libratatui_ffi.a; Package.swift links against
      # the dylib so the Swift test binary (arm64e) never merges Rust std TLS
      # sections — they stay inside the arm64 dylib image where dyld can
      # initialise them correctly.  (ARCHITECTURE.md §5.4 arm64-TLS dylib strategy)
      #
      # --features swift_ffi disables catch_unwind in ffi_guard! (no change to
      # TLS elimination with the dylib approach, but keeps the release build clean).
      #
      # We skip cbindgen here; the committed header in Sources/CRatatuiFFI/include/
      # is the source-of-record ABI (Makefile shim target: best-effort regeneration
      # is only needed when the Rust ABI changes, not on every CI run).
      - name: Build Rust shim (cargo build --release --features swift_ffi)
        working-directory: rust/ratatui-ffi
        run: cargo build --release --features swift_ffi

      # Set the dylib install name to its absolute path so the runtime loader
      # finds it when the Swift test binary is executed.  cargo embeds a relative
      # or @rpath-relative install name by default; on CI the build tree is
      # stable, so an absolute install name is the simplest approach.
      - name: Fix dylib install name (install_name_tool)
        working-directory: rust/ratatui-ffi
        run: |
          DYLIB="$PWD/target/release/libratatui_ffi.dylib"
          install_name_tool -id "$DYLIB" "$DYLIB"

      # Cache SPM resolved packages.
      # swift package reset (run in the build step below) clears the manifest-
      # evaluation cache (.build) but does NOT clear the package download cache
      # (~/.swiftpm). The cache action covers the download cache, speeding up
      # dependency resolution between runs without interfering with reset.
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm
          key: spm-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.arch }}-

      # Reset SPM's manifest-evaluation cache before building.
      # Required when MOONSWIFT_SHIM_SOURCE is toggled: SPM caches the manifest
      # result in .build; without a reset it can silently reuse a stale shim
      # topology from a previous run (ARCHITECTURE.md §5.4 manifest-cache rule).
      - name: Reset SPM manifest cache (swift package reset)
        run: swift package reset

      # Install swift-format (Apple's official formatter — not in the default
      # Xcode toolchain on GitHub runners; brew is the canonical install path).
      # Homebrew is pre-installed on all macos-15 GitHub runners (both arches).
      - name: Install swift-format
        run: brew install swift-format

      # Formatting gate — reject any unformatted Swift source.
      # Uses the project's .swift-format JSON config (4-space indent, 120-col,
      # UseLetInEveryBoundCaseVariable off). Deliberately aligned blocks are
      # protected with // swift-format-ignore comments (see Events.swift,
      # CellBuffer.swift). Runs before the build so formatting failures surface
      # quickly without waiting for compilation.
      - name: Lint Swift formatting (swift-format)
        run: swift-format lint --strict --recursive Sources/ Tests/

      # Full Swift package build in source mode.
      # MOONSWIFT_SHIM_SOURCE=1 and LUASWIFT_INCLUDE_TOMLKIT=1 are already set
      # via the job-level `env` block above.
      - name: Build Swift package (swift build)
        run: swift build

      # Run each test target in its own step so failures are immediately
      # attributable to a specific binary. Targets run sequentially to avoid
      # resource contention on the hosted runner.

      # MoonSwiftCoreTests: pure Swift logic, Lua engine (LuacheckSpikeTests),
      # YAML/JSON/TOML decoders, JSONPath evaluator, project validation.
      # LuacheckSpikeTests is the required CI gate (PRD F4.0).
      - name: Test MoonSwiftCoreTests
        run: swift test --filter MoonSwiftCoreTests

      # RatatuiKitTests: FFI bindings — links the Rust dylib.
      # Run with continue-on-error so the crash-report step runs even on signal.
      - name: Test RatatuiKitTests
        id: ratatui_tests
        continue-on-error: true
        run: swift test --filter RatatuiKitTests

      # Capture diagnostics if RatatuiKitTests fails.
      # Captures crash report (ips file), dylib install name, and TLS sections
      # to diagnose any remaining dylib-linkage or SIGBUS issues.
      - name: Capture RatatuiKitTests failure diagnostics
        if: steps.ratatui_tests.outcome == 'failure'
        shell: bash
        run: |
          set +e   # Do not exit on individual step failures in this diagnostic.
          echo "=== RatatuiKitTests failed ==="

          echo "=== Rust dylib install name ==="
          RUST_DYLIB="rust/ratatui-ffi/target/release/libratatui_ffi.dylib"
          if [ -f "$RUST_DYLIB" ]; then
            otool -D "$RUST_DYLIB" 2>/dev/null || echo "(otool -D failed)"
            echo "--- dylib TLS sections ---"
            otool -l "$RUST_DYLIB" 2>/dev/null | grep -B1 "sectname.*__thread" | head -20 || echo "(none)"
          else
            echo "(dylib not found at $RUST_DYLIB)"
          fi

          echo "=== Toolchain / test-host architecture ==="
          xcodebuild -version 2>/dev/null || true
          XCTEST_BIN="$(xcrun -f xctest 2>/dev/null)"
          echo "xctest harness: ${XCTEST_BIN:-(not found)}"
          [ -n "$XCTEST_BIN" ] && file "$XCTEST_BIN"
          sysctl -n machdep.cpu.brand_string 2>/dev/null || true
          uname -m

          echo "=== swiftpm-testing-helper slices (swift-testing test host) ==="
          # SPM runs swift-testing tests inside swiftpm-testing-helper, which
          # loads the test bundle + Rust dylib. If the helper has an arm64e
          # slice, dyld picks it on Apple Silicon and the arm64 Rust dylib's
          # TLS descriptors are PAC-unsigned -> SIGBUS (the crash we chase).
          for XC in /Applications/Xcode*.app; do
            HELPER="$XC/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/libexec/swift/pm/swiftpm-testing-helper"
            if [ -f "$HELPER" ]; then
              echo "--- $XC ---"
              lipo -archs "$HELPER" 2>/dev/null || file "$HELPER"
            fi
          done
          echo "=== Installed Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null

          echo "=== macOS Diagnostic Reports (test-process crash) ==="
          # ReportCrash writes the .ips asynchronously — give it time to land,
          # polling for a report named after the test binary specifically.
          # The previous head -100 of "latest .ips" captured unrelated daemon
          # crashes (e.g. lsd) and missed the actual test-process report.
          REPORT=""
          for i in $(seq 1 12); do
            REPORT=$(ls -t ~/Library/Logs/DiagnosticReports/MoonSwiftPackageTests*.ips \
                           ~/Library/Logs/DiagnosticReports/swiftpm-testing-helper*.ips \
                           /Library/Logs/DiagnosticReports/MoonSwiftPackageTests*.ips \
                           /Library/Logs/DiagnosticReports/swiftpm-testing-helper*.ips \
                           2>/dev/null | head -1)
            [ -n "$REPORT" ] && break
            sleep 5
          done
          if [ -n "$REPORT" ]; then
            echo "=== Test-process crash report: $REPORT (full) ==="
            cat "$REPORT"
          else
            echo "(no test-process .ips appeared after 60s)"
            for dir in ~/Library/Logs/DiagnosticReports /Library/Logs/DiagnosticReports; do
              [ -d "$dir" ] && { echo "--- $dir ---"; ls -lt "$dir" | head -10; }
            done
          fi

          echo "=== Test binary analysis ==="
          TEST_BIN=$(find .build -name "MoonSwiftPackageTests.xctest" -type d 2>/dev/null | head -1)
          if [ -n "$TEST_BIN" ]; then
            BIN=$(find "$TEST_BIN" -maxdepth 3 -type f -perm -u+x 2>/dev/null | head -1)
            echo "Binary: ${BIN:-(not found)}"
            if [ -n "$BIN" ]; then
              echo "--- TLS sections in test binary (should be none after dylib switch) ---"
              otool -l "$BIN" 2>/dev/null | grep -B1 "sectname.*__thread" | head -40 || echo "(none)"
              echo "--- Linked dylibs (libratatui_ffi.dylib should appear) ---"
              otool -L "$BIN" 2>/dev/null | head -30
            fi
          else
            echo "(test binary not found in .build/)"
          fi

          # Propagate failure.
          exit 1

      # MoonSwiftTUITests: TUI app model tests.
      - name: Test MoonSwiftTUITests
        run: swift test --filter MoonSwiftTUITests
